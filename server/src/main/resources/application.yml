spring:
  application:
    name: ezderm-appointment
  profiles:
    default: dev
  error:
    include-stacktrace: NEVER

---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:postgresql://localhost:5432/ezappointments
    username: ezappointments
    password: ezappointments
  liquibase:
    enabled: true
    change-log: classpath:/db/changelog/db.changelog-master.yml
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

server:
  port: 8080
