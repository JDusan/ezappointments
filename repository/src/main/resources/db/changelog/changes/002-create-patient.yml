databaseChangeLog:
  - changeSet:
      id: 002-create-patient
      author: dusanjanic
      changes:
        - createTable:
            tableName: patient
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: first_name
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: middle_name
                  type: varchar(255)
              - column:
                  name: last_name
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: date_of_birth
                  type: date
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp(6) with time zone
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp(6) with time zone
              - column:
                  name: deleted_at
                  type: timestamp(6) with time zone
        - createIndex:
            tableName: patient
            indexName: idx_patient_keyset
            columns:
              - column:
                  name: last_name
              - column:
                  name: id
