databaseChangeLog:
  - changeSet:
      id: 001-create-doctor
      author: dusanjanic
      changes:
        - createTable:
            tableName: doctor
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: username
                  type: varchar(32)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: first_name
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: last_name
                  type: varchar(255)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp(6) with time zone
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp(6) with time zone
              - column:
                  name: deleted_at
                  type: timestamp(6) with time zone
        - sql:
            sql: >
              ALTER TABLE doctor
              ADD CONSTRAINT check_doctor_username_format
              CHECK (username ~ '^[a-zA-Z0-9_]{4,32}$');
