databaseChangeLog:
  - changeSet:
      id: 003-create-appointment
      author: dusanjanic
      changes:
        - createTable:
            tableName: appointment
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: patient_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: created_by_doctor_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: starts_at
                  type: timestamp(6) with time zone
                  constraints:
                    nullable: false
              - column:
                  name: ends_at
                  type: timestamp(6) with time zone
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: varchar(16)
                  defaultValue: ACTIVE
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp(6) with time zone
                  constraints:
                    nullable: false
              - column:
                  name: canceled_at
                  type: timestamp(6) with time zone
        - addForeignKeyConstraint:
            baseTableName: appointment
            baseColumnNames: patient_id
            referencedTableName: patient
            referencedColumnNames: id
            constraintName: fk_appointment_patient
        - addForeignKeyConstraint:
            baseTableName: appointment
            baseColumnNames: created_by_doctor_id
            referencedTableName: doctor
            referencedColumnNames: id
            constraintName: fk_appointment_created_by_doctor
        - sql:
            sql: >
              ALTER TABLE appointment
              ADD CONSTRAINT chk_appointment_status
              CHECK (status in ('ACTIVE', 'CANCELED'));
        - sql:
            sql: >
              ALTER TABLE appointment
              ADD CONSTRAINT chk_appointment_time_range
              CHECK (ends_at > starts_at);
        - sql:
            sql: >
              CREATE INDEX idx_appointment_patient_active_future
              ON appointment (patient_id, starts_at)
              WHERE status = 'ACTIVE';
        - sql:
            sql: >
              CREATE INDEX idx_appointment_active_starts
              ON appointment (starts_at)
              WHERE status = 'ACTIVE';
        - createIndex:
            tableName: appointment
            indexName: idx_appointment_starts_id
            columns:
              - column:
                  name: starts_at
              - column:
                  name: id
