openapi: '3.0.2'
info:
  title: Appointment App
  version: '1.0'
  description: |
    Small "REST-like" API that handles appointments between doctors and patients.
servers:
  - url: https://api.eztask.test/

paths:
  #################################################
  # Appointments
  #################################################
  /v1/appointment:
    post:
      operationId: createAppointment
      summary: Create a new appointment
      description: >
        Creates an appointment for a patient and one or more doctors. The
        createdByDoctorId field identifies the doctor responsible for creating
        the appointment. X-Username is still required as the trusted caller
        identity.
      parameters:
        - in: header
          name: X-Username
          required: true
          schema:
            type: string
            pattern: '^[a-zA-Z0-9_]{4,32}$'
          description: >
            Required header that should contain the username (e.g., the doctor creating
            this appointment). The service trusts this header as the authenticated user.
      requestBody:
        description: JSON object containing appointment details
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAppointmentRequest'
      responses:
        '201':
          description: Returns the created appointment.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Appointment'
        '400':
          description: Validation error (invalid input, missing fields, etc.).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Username header missing.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          
  /v1/appointment/{id}:
    get:
      operationId: getAppointment
      summary: Retrieve an appointment by its unique ID
      description: >
        Returns a single appointment, including a list of doctors at the appointment
        and the patient data.
      parameters:
        - in: header
          name: X-Username
          required: true
          schema:
            type: string
            pattern: '^[a-zA-Z0-9_]{4,32}$'
          description: >
            Required header containing the username, trusted as the authenticated user.
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: ID of the appointment to retrieve.
      responses:
        '200':
          description: A response containing the requested appointment details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Appointment'
        '400':
          description: Invalid or missing query parameter(s).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Username header missing.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Appointment not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      operationId: cancelAppointment
      summary: Cancel an appointment
      parameters:
        - in: header
          name: X-Username
          required: true
          schema:
            type: string
            pattern: '^[a-zA-Z0-9_]{4,32}$'
          description: >
            Required header containing the username of the user attempting to cancel the appointment.
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: ID of the appointment to cancel.
      responses:
        '200':
          description: Appointment canceled successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Appointment'
        '401':
          description: Username header missing.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: User not authorized to cancel this appointment.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Appointment not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/appointment/doctor/{id}:
    get:
      operationId: getAppointmentsByDoctor
      summary: Retrieve all appointments by doctor ID
      description: >
        Returns a list of appointments associated with a given doctor.
      parameters:
        - in: header
          name: X-Username
          required: true
          schema:
            type: string
            pattern: '^[a-zA-Z0-9_]{4,32}$'
          description: >
            Required header containing the username, trusted as the authenticated user.
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: The unique ID of the doctor whose appointments to retrieve.
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
      responses:
        '200':
          description: A list of appointments for the specified doctor.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppointmentPageResponse'
        '400':
          description: Invalid or missing query parameter(s).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Username header missing.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Doctor not found or no appointments found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  #################################################
  # Patients
  #################################################
  /v1/patient:
    post:
      operationId: createPatient
      summary: Create a new patient
      parameters:
        - in: header
          name: X-Username
          required: true
          schema:
            type: string
            pattern: '^[a-zA-Z0-9_]{4,32}$'
          description: >
            Required header that should contain the username.
      requestBody:
        description: JSON object containing new patient details
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePatientRequest'
      responses:
        '201':
          description: Returns the created patient record.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Patient'
        '400':
          description: Validation error (invalid input, missing fields, etc.).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Username header missing.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/patient/search:
    post:
      operationId: searchPatients
      summary: Search for patients
      parameters:
        - in: header
          name: X-Username
          required: true
          schema:
            type: string
            pattern: '^[a-zA-Z0-9_]{4,32}$'
          description: >
            Required username header. All users must supply
            a valid username, even for searching.
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
      requestBody:
        description: JSON object containing search text.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SearchPatientRequest'
      responses:
        '200':
          description: A list (page) of patients matching the search criteria.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PatientPageResponse'
        '400':
          description: Bad request (invalid query params).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Username header missing.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/patient/{id}:
    delete:
      operationId: deletePatient
      summary: Delete a patient record
      parameters:
        - in: header
          name: X-Username
          required: true
          schema:
            type: string
            pattern: '^[a-zA-Z0-9_]{4,32}$'
          description: >
            Required header containing the username of the user requesting the delete operation.
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: ID of the patient record to delete.
      responses:
        '204':
          description: Patient record deleted successfully.
        '401':
          description: Username header missing.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: User not authorized to delete this patient record.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Patient not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Deleting a patient with ACTIVE future appointments is forbidden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  #################################################
  # Doctors
  #################################################
 
  /v1/doctor:
    post:
      operationId: createDoctor
      summary: Create a new doctor
      parameters:
        - in: header
          name: X-Username
          required: true
          schema:
            type: string
            pattern: '^[a-zA-Z0-9_]{4,32}$'
          description: >
            Required header that should contain the username, trusted as the authenticated user.
      requestBody:
        description: JSON object containing new doctor details
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDoctorRequest'
      responses:
        '201':
          description: Returns the created doctor record.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Doctor'
        '400':
          description: Validation error (invalid input, missing fields, etc.).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Username header missing.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Creating a doctor with the same username as an existing doctor is forbidden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/doctor/{id}:
    delete:
      operationId: deleteDoctor
      summary: Delete a doctor record
      parameters:
        - in: header
          name: X-Username
          required: true
          schema:
            type: string
            pattern: '^[a-zA-Z0-9_]{4,32}$'
          description: >
            Required header containing the username of the user requesting the delete operation.
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
          description: ID of the doctor record to delete.
      responses:
        '204':
          description: Doctor record deleted successfully.
        '401':
          description: Username header missing.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: User not authorized to delete this doctor record.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Doctor not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Deleting a doctor with ACTIVE future appointments is forbidden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  parameters:
    PageParam:
      in: query
      name: page
      required: false
      schema:
        type: integer
        minimum: 0
        default: 0
      description: Zero-based page number.
    SizeParam:
      in: query
      name: size
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 20
      description: Number of items per page.
  schemas:
    Doctor:
      type: object
      required:
        - id
        - username
        - firstName
        - lastName
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
          pattern: '^[a-zA-Z0-9_]{4,32}$'
        firstName:
          type: string
        lastName:
          type: string
    Patient:
      type: object
      required:
        - id
        - firstName
        - lastName
        - dateOfBirth
      properties:
        id:
          type: string
          format: uuid
        firstName:
          type: string
        middleName:
          type: string
          nullable: true
        lastName:
          type: string
        dateOfBirth:
          type: string
          format: date
    Appointment:
      type: object
      required:
        - id
        - patient
        - doctors
        - createdByDoctorId
        - startsAt
        - endsAt
        - status
      properties:
        id:
          type: string
          format: uuid
        patient:
          $ref: '#/components/schemas/Patient'
        doctors:
          type: array
          items:
            $ref: '#/components/schemas/Doctor'
        createdByDoctorId:
          type: string
          format: uuid
        startsAt:
          type: string
          format: date-time
        endsAt:
          type: string
          format: date-time
        status:
          type: string
          enum:
            - ACTIVE
            - CANCELED
        canceledAt:
          type: string
          format: date-time
          nullable: true
    CreateDoctorRequest:
      type: object
      required:
        - username
        - firstName
        - lastName
      properties:
        username:
          type: string
          pattern: '^[a-zA-Z0-9_]{4,32}$'
        firstName:
          type: string
        lastName:
          type: string
    CreatePatientRequest:
      type: object
      required:
        - firstName
        - lastName
        - dateOfBirth
      properties:
        firstName:
          type: string
        middleName:
          type: string
          nullable: true
        lastName:
          type: string
        dateOfBirth:
          type: string
          format: date
    CreateAppointmentRequest:
      type: object
      required:
        - patientId
        - doctorIds
        - createdByDoctorId
        - startsAt
        - endsAt
      properties:
        patientId:
          type: string
          format: uuid
        doctorIds:
          type: array
          minItems: 1
          items:
            type: string
            format: uuid
        createdByDoctorId:
          type: string
          format: uuid
        startsAt:
          type: string
          format: date-time
        endsAt:
            type: string
            format: date-time
    SearchPatientRequest:
      type: object
      required:
        - query
      properties:
        query:
          type: string
          minLength: 3
          maxLength: 30
          description: Free-text patient search term.
    ErrorResponse:
      type: object
      required:
        - status
        - title
      properties:
        type:
          type: string
          format: uri
          nullable: true
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
          nullable: true
        instance:
          type: string
          nullable: true
    PageInfo:
      type: object
      required:
        - page
        - size
      properties:
        page:
          type: integer
        size:
          type: integer
    PatientPageResponse:
      type: object
      required:
        - items
        - page
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Patient'
        page:
          $ref: '#/components/schemas/PageInfo'
    AppointmentPageResponse:
      type: object
      required:
        - items
        - page
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Appointment'
        page:
          $ref: '#/components/schemas/PageInfo'
