plugins {
	id 'org.openapi.generator'
}

description = 'OpenAPI contract and generated API DTOs/interfaces'

dependencies {
	api 'org.springframework:spring-web'
	api 'org.springframework:spring-context'
	api 'com.fasterxml.jackson.core:jackson-annotations'
	api 'jakarta.validation:jakarta.validation-api'
	api 'jakarta.annotation:jakarta.annotation-api'
	api 'jakarta.servlet:jakarta.servlet-api'
}

def generatedDir = layout.buildDirectory.dir('generated/openapi')

openApiGenerate {
	generatorName = 'spring'
	library = 'spring-boot'
	inputSpec = layout.projectDirectory.file('src/main/resources/openapi/api-spec-ezderm.yml').asFile.path
	outputDir = generatedDir.get().asFile.path
	apiPackage = 'com.ezderm.appointment.api.controller'
	modelPackage = 'com.ezderm.appointment.api.model'
	invokerPackage = 'com.ezderm.appointment.api'
	configOptions = [
		annotationLibrary: 'none',
		dateLibrary: 'java8',
		documentationProvider: 'none',
		interfaceOnly: 'true',
		openApiNullable: 'false',
		skipDefaultInterface: 'true',
		useSpringBoot4: 'true',
		useTags: 'true'
	]
}

sourceSets {
	main {
		java {
			srcDir generatedDir.map { it.dir('src/main/java') }
		}
	}
}

tasks.named('compileJava') {
	dependsOn tasks.named('openApiGenerate')
}
