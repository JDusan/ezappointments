services:
    postgres:
        image: postgres:18.4
        container_name: ezappointments-postgres
        environment:
            POSTGRES_DB: ezappointments
            POSTGRES_USER: ezappointments
            POSTGRES_PASSWORD: ezappointments
        ports:
            - "5432:5432"
        volumes:
            - postgres-data:/var/lib/postgresql
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ezappointments -d ezappointments"]
            interval: 10s
            timeout: 5s
            retries: 5

    pgadmin:
        image: dpage/pgadmin4:latest
        container_name: ezappointments-pgadmin
        profiles:
            - tools
        environment:
            PGADMIN_DEFAULT_EMAIL: admin@ezappointments.local
            PGADMIN_DEFAULT_PASSWORD: admin
        ports:
            - "5050:80"
        depends_on:
            postgres:
                condition: service_healthy

volumes:
    postgres-data:
