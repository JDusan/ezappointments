services:
    postgres:
        image: postgres:18.4
        container_name: ezappointments-postgres
        environment:
            POSTGRES_DB: ezappointments
            POSTGRES_USER: ezappointments
            POSTGRES_PASSWORD: ezappointments
        ports:
            - "5432:5432"
        volumes:
            - postgres-data:/var/lib/postgresql
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ezappointments -d ezappointments"]
            interval: 10s
            timeout: 5s
            retries: 5

    app:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: ezappointments-app
        environment:
            SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ezappointments
            SPRING_DATASOURCE_USERNAME: ezappointments
            SPRING_DATASOURCE_PASSWORD: ezappointments
            SPRING_LIQUIBASE_ENABLED: "true"
        ports:
            - "8080:8080"
        depends_on:
            postgres:
                condition: service_healthy

volumes:
    postgres-data:
